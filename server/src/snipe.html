<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KatMap Stream Snipe</title>
  <link href="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js"></script>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#020617; color:#e5e7eb; }
    body { margin:0; height:100vh; overflow:hidden; display:grid; grid-template-rows:auto 1fr; }
    header { z-index:2; display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px; background:#0f172add; backdrop-filter:blur(10px); border-bottom:1px solid #334155; }
    h1 { font-size:16px; margin:0 8px 0 0; }
    input, button { background:#111827; color:#e5e7eb; border:1px solid #475569; border-radius:8px; padding:8px 10px; font:inherit; }
    input { min-width:260px; }
    button { cursor:pointer; background:#1e293b; }
    button:hover { background:#334155; }
    button.active { background:#0f766e; border-color:#2dd4bf; }
    button.primary { background:#134e4a; border-color:#0f766e; }
    #status { margin-left:auto; color:#cbd5e1; font-size:13px; }
    #map { min-height:0; width:100%; height:100%; }
    #panel { position:absolute; z-index:1; right:12px; bottom:12px; width:min(420px, calc(100vw - 24px)); max-height:42vh; overflow:auto; background:#0f172add; border:1px solid #334155; border-radius:12px; backdrop-filter:blur(10px); box-shadow:0 10px 30px #0008; }
    #summary { padding:12px; font-weight:700; border-bottom:1px solid #334155; }
    #steps { padding:6px 12px 12px; margin:0; }
    #steps li { margin:8px 0; color:#cbd5e1; font-size:13px; }
    .hint { color:#94a3b8; font-size:12px; }
    .marker { width:20px; height:20px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 10px #000; }
    .user { background:#2563eb; }
    .streamer { background:#ef4444; }
    @media (max-width: 720px) {
      body { grid-template-rows:auto 1fr; }
      header { align-items:stretch; }
      h1 { width:100%; }
      input { min-width:0; flex:1 1 100%; }
      #status { width:100%; margin-left:0; }
      #panel { left:8px; right:8px; bottom:8px; width:auto; max-height:34vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎯 Stream Snipe</h1>
    <input id="token" type="password" placeholder="Stream sniping token" autocomplete="current-password" />
    <button id="start" class="primary">Start GPS</button>
    <button data-mode="walking" class="mode active">Walking</button>
    <button data-mode="cycling" class="mode">Cycling</button>
    <button data-mode="car" class="mode">Car</button>
    <button id="follow" class="active">Follow me</button>
    <span id="status">Enter token and start GPS</span>
  </header>
  <div id="map"></div>
  <div id="panel">
    <div id="summary">No route yet</div>
    <ol id="steps"><li class="hint">This routes from your browser GPS to the streamer's current live position.</li></ol>
  </div>
<script>
const $ = id => document.getElementById(id);
const tokenEl = $('token');
tokenEl.value = localStorage.getItem('katmap-snipe-token') || '';
tokenEl.addEventListener('input', () => localStorage.setItem('katmap-snipe-token', tokenEl.value));
let mode = 'walking', userLoc = null, streamerLoc = null, lastRouteAt = 0, lastRouteUser = null, lastRouteStreamer = null;
let userMarker = null, streamerMarker = null, routeTimer = null, follow = true, watchId = null;

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: { osm: { type:'raster', tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize:256, attribution:'© OpenStreetMap contributors' } },
    layers: [{ id:'osm', type:'raster', source:'osm' }]
  },
  center: [-122.3321, 47.6062], zoom: 13
});
map.addControl(new maplibregl.NavigationControl());
map.on('load', () => {
  map.addSource('route', { type:'geojson', data: emptyFc() });
  map.addLayer({ id:'route-casing', type:'line', source:'route', layout:{'line-join':'round','line-cap':'round'}, paint:{'line-color':'#020617','line-width':8,'line-opacity':0.7} });
  map.addLayer({ id:'route-line', type:'line', source:'route', layout:{'line-join':'round','line-cap':'round'}, paint:{'line-color':'#22c55e','line-width':5,'line-opacity':0.95} });
});
new ResizeObserver(() => map.resize()).observe($('map'));
window.addEventListener('resize', () => map.resize());
function emptyFc(){ return { type:'FeatureCollection', features:[] }; }
function authHeaders(){ return { Authorization:`Bearer ${tokenEl.value}`, 'Content-Type':'application/json' }; }
async function api(url, opts={}){
  const res = await fetch(url, { ...opts, headers:{ ...authHeaders(), ...(opts.headers||{}) } });
  if (!res.ok) throw new Error(await res.text() || res.statusText);
  return res.json();
}
function setStatus(s){ $('status').textContent = s; }
function marker(className){ const el = document.createElement('div'); el.className = `marker ${className}`; return el; }
function updateMarkers(){
  if (userLoc) {
    if (!userMarker) userMarker = new maplibregl.Marker({ element: marker('user') }).addTo(map);
    userMarker.setLngLat([userLoc.lon, userLoc.lat]);
  }
  if (streamerLoc) {
    if (!streamerMarker) streamerMarker = new maplibregl.Marker({ element: marker('streamer') }).addTo(map);
    streamerMarker.setLngLat([streamerLoc.lon, streamerLoc.lat]);
  }
}
$('start').onclick = () => startGps();
$('follow').onclick = () => { follow = !follow; $('follow').classList.toggle('active', follow); };
document.querySelectorAll('.mode').forEach(btn => btn.onclick = () => {
  mode = btn.dataset.mode;
  document.querySelectorAll('.mode').forEach(b => b.classList.toggle('active', b === btn));
  route(true);
});
function startGps(){
  if (!tokenEl.value) { setStatus('Missing token'); return; }
  if (!navigator.geolocation) { setStatus('Geolocation unsupported'); return; }
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos => {
    userLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
    updateMarkers();
    route();
  }, err => setStatus(`GPS error: ${err.message}`), { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
  clearInterval(routeTimer);
  routeTimer = setInterval(() => route(), 3000);
  route(true);
}
async function route(force=false){
  if (!tokenEl.value) return;
  try {
    const status = await api('/api/snipe/status');
    streamerLoc = status.streamer ? { lat:status.streamer.lat, lon:status.streamer.lon } : null;
    updateMarkers();
    if (!status.live || !streamerLoc) { setStatus('Streamer is offline'); clearRoute(); return; }
    if (!userLoc) { setStatus('Waiting for your GPS…'); return; }
    const now = Date.now();
    const movedUser = !lastRouteUser || distM(userLoc, lastRouteUser) > 20;
    const movedStreamer = !lastRouteStreamer || distM(streamerLoc, lastRouteStreamer) > 20;
    if (!force && !movedUser && !movedStreamer && now - lastRouteAt < 10000) return;
    const data = await api('/api/snipe/route', { method:'POST', body:JSON.stringify({ lat:userLoc.lat, lon:userLoc.lon, mode }) });
    streamerLoc = data.streamer;
    lastRouteAt = now; lastRouteUser = { ...userLoc }; lastRouteStreamer = { ...streamerLoc };
    renderRoute(data);
  } catch (e) { setStatus(e.message); }
}
function clearRoute(){
  if (map.getSource('route')) map.getSource('route').setData(emptyFc());
  $('summary').textContent = 'No route'; $('steps').innerHTML = '<li class="hint">Waiting for the streamer to go live.</li>';
}
function renderRoute(data){
  const coords = decodePolyline6(data.polyline).map(([lat, lon]) => [lon, lat]);
  if (map.getSource('route')) map.getSource('route').setData(coords.length ? { type:'Feature', properties:{}, geometry:{ type:'LineString', coordinates:coords } } : emptyFc());
  $('summary').textContent = `${data.distance_km.toFixed(1)} km · ${Math.round(data.duration_min)} min · ${mode}`;
  $('steps').innerHTML = data.maneuvers.slice(0, 30).map(m => `<li>${escapeHtml(m.instruction)} <span class="hint">${formatKm(m.distance_km)}</span></li>`).join('') || '<li class="hint">No maneuvers.</li>';
  setStatus(`Updated ${new Date().toLocaleTimeString()}`);
  updateMarkers();
  if (follow && coords.length) fit(coords);
}
function fit(coords){
  requestAnimationFrame(() => { map.resize(); const b = coords.reduce((b,c)=>b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0])); map.fitBounds(b, { padding:{ top:80, right:40, bottom:220, left:40 }, maxZoom:17, duration:400 }); });
}
function formatKm(km){ return km < 1 ? `${Math.round(km*1000)} m` : `${km.toFixed(1)} km`; }
function distM(a,b){
  const R=6371000, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const lat1=a.lat*Math.PI/180, lat2=b.lat*Math.PI/180;
  const h=Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function decodePolyline6(encoded){
  let coords=[], index=0, lat=0, lon=0;
  while(index<encoded.length){
    let shift=0,result=0,b;
    do{ b=encoded.charCodeAt(index++)-63; result|=(b&0x1f)<<shift; shift+=5; }while(b>=0x20);
    lat += (result&1) ? ~(result>>1) : (result>>1);
    shift=0; result=0;
    do{ b=encoded.charCodeAt(index++)-63; result|=(b&0x1f)<<shift; shift+=5; }while(b>=0x20);
    lon += (result&1) ? ~(result>>1) : (result>>1);
    coords.push([lat/1e6, lon/1e6]);
  }
  return coords;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>

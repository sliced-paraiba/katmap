<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KatMap History Admin</title>
  <link href="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js"></script>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#0f172a; color:#e5e7eb; }
    body { margin:0; display:grid; grid-template-columns:360px 1fr; height:100vh; overflow:hidden; }
    aside { border-right:1px solid #334155; display:flex; flex-direction:column; min-width:0; min-height:0; }
    header { padding:12px; border-bottom:1px solid #334155; display:grid; gap:8px; flex:0 0 auto; }
    input, button { background:#111827; color:#e5e7eb; border:1px solid #475569; border-radius:6px; padding:7px 9px; }
    button { cursor:pointer; background:#1e293b; }
    button:hover { background:#334155; }
    button.danger { border-color:#7f1d1d; background:#450a0a; }
    button.primary { border-color:#0f766e; background:#134e4a; }
    label { display:flex; align-items:center; gap:6px; font-size:13px; color:#cbd5e1; }
    #list { flex:1 1 auto; overflow-y:auto; min-height:0; }
    .entry { padding:10px 12px; border-bottom:1px solid #1f2937; cursor:pointer; }
    .entry:hover, .entry.active { background:#1e293b; }
    .entry.hidden { opacity:.55; }
    .entry .name { font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .entry .meta { color:#94a3b8; font-size:12px; margin-top:3px; }
    main { display:grid; grid-template-rows:auto 1fr; min-width:0; min-height:0; }
    #toolbar { padding:10px; border-bottom:1px solid #334155; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    #toolbar input { min-width:260px; }
    #status { color:#94a3b8; font-size:13px; margin-left:auto; }
    #map { min-height:0; width:100%; height:100%; position:relative; }
    .marker { width:12px; height:12px; border-radius:50%; background:#60a5fa; border:2px solid #fff; box-shadow:0 0 7px #000; cursor:pointer; }
    .marker.hidden-point { background:#64748b; opacity:.35; }
    .marker.moved-point { background:#f59e0b; }
    .marker.selected { width:18px; height:18px; background:#ef4444; }
    .hint { color:#94a3b8; font-size:12px; }
  </style>
</head>
<body>
  <aside>
    <header>
      <input id="token" type="password" placeholder="Admin token" autocomplete="current-password" />
      <label><input id="show-hidden" type="checkbox" /> Show hidden entries</label>
      <button id="load" class="primary">Load history</button>
      <div class="hint">Auth uses <code>ADMIN_API_KEY</code>, falling back to companion API key.</div>
    </header>
    <div id="list"></div>
  </aside>
  <main>
    <div id="toolbar">
      <input id="name" placeholder="Session name" />
      <button id="rename">Rename</button>
      <button id="toggle-hide">Hide entry</button>
      <button id="delete-entry" class="danger">Delete entry</button>
      <button id="hide-point">Hide point</button>
      <button id="unhide-point">Unhide point</button>
      <button id="reset-point">Reset moved point</button>
      <button id="discard-edits" class="danger">Discard all GPS edits</button>
      <button id="save-edits" class="primary">Save GPS edits</button>
      <span id="status">No entry selected</span>
    </div>
    <div id="map"></div>
  </main>
<script>
const $ = id => document.getElementById(id);
const tokenEl = $('token');
tokenEl.value = localStorage.getItem('katmap-admin-token') || '';
tokenEl.addEventListener('input', () => localStorage.setItem('katmap-admin-token', tokenEl.value));
let entries = [], current = null, selectedIndex = null, markers = [];

const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: { osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '© OpenStreetMap contributors' } },
    layers: [{ id:'osm', type:'raster', source:'osm' }]
  },
  center: [-122.3321, 47.6062], zoom: 12
});
map.addControl(new maplibregl.NavigationControl());
map.on('load', () => {
  map.addSource('trail', { type:'geojson', lineMetrics:true, data: emptyFc() });
  map.addLayer({ id:'trail-casing', type:'line', source:'trail', layout:{'line-join':'round','line-cap':'round'}, paint:{'line-color':'#111827','line-width':7,'line-opacity':0.45} });
  map.addLayer({ id:'trail-line', type:'line', source:'trail', layout:{'line-join':'round','line-cap':'round'}, paint:{'line-gradient':['interpolate',['linear'],['line-progress'],0,'#60a5fa',0.3,'#3b82f6',0.6,'#6366f1',0.85,'#7c3aed',1,'#581c87'],'line-width':4,'line-opacity':0.9} });
  requestAnimationFrame(() => { map.resize(); renderMap({ fit: true }); });
});
window.addEventListener('resize', () => map.resize());
new ResizeObserver(() => map.resize()).observe($('map'));
function emptyFc(){ return { type:'FeatureCollection', features:[] }; }
function authHeaders(){ return { Authorization: `Bearer ${tokenEl.value}`, 'Content-Type':'application/json' }; }
async function api(url, opts={}) {
  const res = await fetch(url, { ...opts, headers: { ...authHeaders(), ...(opts.headers||{}) } });
  if (!res.ok) throw new Error(await res.text() || res.statusText);
  const ct = res.headers.get('content-type') || '';
  return ct.includes('json') ? res.json() : res.text();
}
function fmt(ms){ return new Date(ms).toISOString().slice(0,16).replace('T',' '); }
function effectivePoint(entry, idx){ return entry.edits.moved_points[idx] || entry.breadcrumbs[idx]; }
function editedPoints(entry){
  const hidden = new Set(entry.edits.hidden_indices || []);
  return entry.breadcrumbs.map((_, i) => [i, effectivePoint(entry, i)]).filter(([i]) => !hidden.has(i));
}
async function load(){
  $('status').textContent = 'Loading…';
  entries = await api(`/api/admin/history?all=${$('show-hidden').checked ? 'true' : 'false'}`);
  renderList(); $('status').textContent = `${entries.length} entries`;
}
function renderList(){
  $('list').innerHTML = entries.map(e => {
    const name = e.session_id || e.stream_title || e.streamer_id;
    const pts = e.edited_breadcrumbs.length;
    return `<div class="entry ${e.hidden?'hidden':''} ${current?.id===e.id?'active':''}" data-id="${e.id}"><div class="name">#${e.id} ${escapeHtml(name)}</div><div class="meta">${fmt(e.started_at)} · ${pts}/${e.breadcrumbs.length} pts ${e.hidden?'· hidden':''} ${e.completed?'':'· incomplete'}</div></div>`;
  }).join('');
  document.querySelectorAll('.entry').forEach(el => el.onclick = () => selectEntry(Number(el.dataset.id)));
}
function selectEntry(id){
  current = entries.find(e => e.id === id); selectedIndex = null;
  $('name').value = current.session_id || '';
  $('toggle-hide').textContent = current.hidden ? 'Unhide entry' : 'Hide entry';
  renderList(); renderMap({ fit: true });
}
function renderMap({ fit = false } = {}){
  markers.forEach(m => m.remove()); markers = [];
  if (!current || !map.getSource('trail')) return;
  const visible = editedPoints(current);
  const coords = visible.map(([, p]) => p);
  map.getSource('trail').setData(coords.length >= 2 ? { type:'Feature', properties:{}, geometry:{ type:'LineString', coordinates:coords } } : emptyFc());
  const hidden = new Set(current.edits.hidden_indices || []);
  current.breadcrumbs.forEach((orig, idx) => {
    const p = effectivePoint(current, idx);
    const el = document.createElement('div');
    el.className = 'marker' + (hidden.has(idx) ? ' hidden-point' : '') + (current.edits.moved_points[idx] ? ' moved-point' : '') + (selectedIndex===idx ? ' selected' : '');
    const marker = new maplibregl.Marker({ element: el, draggable: true }).setLngLat(p).addTo(map);
    el.title = `Point ${idx + 1}`;
    el.onclick = ev => { ev.stopPropagation(); selectedIndex = idx; $('status').textContent = `Selected point ${idx + 1}/${current.breadcrumbs.length}`; renderMap(); };
    marker.on('dragend', () => { const ll = marker.getLngLat(); current.edits.moved_points[idx] = [ll.lng, ll.lat]; renderMap(); });
    markers.push(marker);
  });
  if (fit && coords.length) {
    fitTrail(coords);
  }
}
function fitTrail(coords){
  // Compute center/zoom ourselves instead of fitBounds. In this CSS grid layout
  // fitBounds was occasionally using stale transform dimensions, causing a large offset.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    map.resize();
    const w = $('map').clientWidth;
    const h = $('map').clientHeight;
    if (!w || !h) return;
    const lngs = coords.map(c => c[0]);
    const lats = coords.map(c => c[1]);
    const west = Math.min(...lngs), east = Math.max(...lngs);
    const south = Math.min(...lats), north = Math.max(...lats);
    const center = [(west + east) / 2, (south + north) / 2];
    if (coords.length === 1 || (west === east && south === north)) {
      map.jumpTo({ center, zoom: Math.min(map.getMaxZoom(), 16) });
      return;
    }
    const padding = 70;
    const z = Math.min(
      zoomForLngSpan(east - west, Math.max(1, w - padding * 2)),
      zoomForLatSpan(north, south, Math.max(1, h - padding * 2)),
      16
    );
    map.jumpTo({ center, zoom: z });
  }));
}
function zoomForLngSpan(lngSpan, px){
  return Math.log2((360 * px) / (Math.max(lngSpan, 0.00001) * 512));
}
function latToMercator(lat){
  const clamped = Math.max(-85.051129, Math.min(85.051129, lat));
  const rad = clamped * Math.PI / 180;
  return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2;
}
function zoomForLatSpan(north, south, px){
  const span = Math.abs(latToMercator(north) - latToMercator(south));
  return Math.log2(px / (Math.max(span, 0.0000001) * 512));
}
function needPoint(){ if (selectedIndex == null) { alert('Select a point first'); return false; } return true; }
$('load').onclick = () => load().catch(err => $('status').textContent = err.message);
$('show-hidden').onchange = () => load().catch(err => $('status').textContent = err.message);
$('rename').onclick = async () => { if (!current) return; await api(`/api/admin/history/${current.id}`, { method:'PATCH', body:JSON.stringify({ session_id: $('name').value ? $('name').value : null }) }); current.session_id = $('name').value || null; renderList(); };
$('toggle-hide').onclick = async () => { if (!current) return; const hidden = !current.hidden; await api(`/api/admin/history/${current.id}`, { method:'PATCH', body:JSON.stringify({ hidden }) }); current.hidden = hidden; $('toggle-hide').textContent = hidden ? 'Unhide entry' : 'Hide entry'; renderList(); };
$('delete-entry').onclick = async () => { if (!current || !confirm(`Permanently delete entry #${current.id}?`)) return; await api(`/api/admin/history/${current.id}`, { method:'DELETE' }); entries = entries.filter(e => e.id !== current.id); current = null; renderList(); renderMap(); };
$('hide-point').onclick = () => { if (!current || !needPoint()) return; if (!current.edits.hidden_indices.includes(selectedIndex)) current.edits.hidden_indices.push(selectedIndex); renderMap(); };
$('unhide-point').onclick = () => { if (!current || !needPoint()) return; current.edits.hidden_indices = current.edits.hidden_indices.filter(i => i !== selectedIndex); renderMap(); };
$('reset-point').onclick = () => { if (!current || !needPoint()) return; delete current.edits.moved_points[selectedIndex]; renderMap(); };
$('discard-edits').onclick = () => { if (!current || !confirm('Discard all saved GPS edits for this entry? Original breadcrumbs will be restored.')) return; current.edits = { hidden_indices: [], moved_points: {} }; selectedIndex = null; renderMap(); };
$('save-edits').onclick = async () => { if (!current) return; current.edits.hidden_indices.sort((a,b)=>a-b); await api(`/api/admin/history/${current.id}/edits`, { method:'PUT', body:JSON.stringify(current.edits) }); $('status').textContent = 'Saved GPS edits'; current.edited_breadcrumbs = editedPoints(current).map(([,p]) => p); renderList(); };
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>

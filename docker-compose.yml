services:
  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - valhalla-data:/custom_files
    environment:
      # Washington state + California — covers Seattle area and Los Angeles
      tile_urls: "https://download.geofabrik.de/north-america/us/washington-latest.osm.pbf https://download.geofabrik.de/north-america/us/california-latest.osm.pbf"
      serve_tiles: "True"
      build_elevation: "False"
      build_admins: "True"
      build_time_zones: "True"
    restart: unless-stopped

volumes:
  valhalla-data:

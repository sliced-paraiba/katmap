<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KatMap Weather</title>
    <link rel="stylesheet" href="/src/weather-overlay.css" />
  </head>
  <body>
    <div id="weather-overlay">
      <div class="weather-top-row">
        <span id="weather-icon"></span>
        <div class="weather-primary">
          <span id="weather-temp"></span>
          <span class="weather-feels" id="weather-feels"></span>
        </div>
      </div>
      <div class="weather-bottom-row">
        <span id="weather-location"></span>
        <span id="weather-wind"></span>
      </div>
    </div>
    <script type="module" src="/src/weather-overlay.ts"></script>
  </body>
</html>

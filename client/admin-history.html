<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KatMap History Admin</title>
  </head>
  <body>
    <aside>
      <header>
        <input id="token" type="password" placeholder="Admin token" autocomplete="current-password" />
        <select id="theme-select" class="theme-select">
          <option value="dark">Dark Matter</option>
          <option value="light">Positron</option>
          <option value="bright">OSM Bright</option>
          <option value="fiord">Fiord Color</option>
          <option value="toner">Toner</option>
          <option value="basic">Basic</option>
          <option value="neon">Neon Night</option>
          <option value="midnight">Midnight Blue</option>
          <option value="raster">Raster (OSM)</option>
        </select>
        <label><input id="show-hidden" type="checkbox" /> Show hidden entries</label>
        <button id="load" class="primary">Load history</button>
        <div class="hint">Auth uses <code>ADMIN_API_KEY</code>, falling back to companion API key.</div>
      </header>
      <div id="list"></div>
    </aside>
    <main>
      <div id="toolbar">
        <input id="name" placeholder="Session name" />
        <button id="rename">Rename</button>
        <button id="toggle-hide">Hide entry</button>
        <button id="delete-entry" class="danger">Hide entry (soft delete)</button>
        <button id="hide-point">Hide point</button>
        <button id="unhide-point">Unhide point</button>
        <button id="reset-point">Reset moved point</button>
        <input id="range-start" class="small" type="number" min="1" step="1" placeholder="From #" title="First point number for bulk hide" />
        <input id="range-end" class="small" type="number" min="1" step="1" placeholder="To #" title="Last point number for bulk hide" />
        <button id="hide-range">Hide range</button>
        <button id="undo-edit">Undo local edit</button>
        <button id="discard-edits" class="danger">Discard all GPS edits</button>
        <input id="accuracy-threshold" type="number" min="1" step="1" value="100" title="Accuracy threshold in meters" />
        <button id="hide-low-accuracy">Hide poor GPS</button>
        <button id="save-edits" class="primary">Save GPS edits</button>
        <span id="status">No entry selected</span>
      </div>
      <div id="map"></div>
    </main>
    <script type="module" src="/src/admin-history.ts"></script>
  </body>
</html>

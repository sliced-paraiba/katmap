<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KatMap Overlay</title>
    <link rel="stylesheet" href="/src/overlay.css" />
  </head>
  <body>
    <div id="overlay">
      <div id="map"></div>
      <div id="telemetry">
        <div class="tel-heading-row">
          <svg id="heading-arrow" viewBox="0 0 40 40" width="40" height="40">
            <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(15,155,142,0.4)" stroke-width="1.5" />
            <polygon points="20,4 16,30 20,24 24,30" fill="#0f9b8e" stroke="#fff" stroke-width="0.5" />
          </svg>
          <div class="tel-values">
            <div class="tel-value" id="tel-speed">-- km/h</div>
            <div class="tel-value" id="tel-alt">-- m</div>
          </div>
        </div>
        <div class="tel-coords" id="tel-coords">--, --</div>
      </div>
    </div>
    <script type="module" src="/src/overlay.ts"></script>
  </body>
</html>
